<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistenku Intro</title> 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      background: #fff;
      color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Black screen split (intro) */
    .black-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .top-half,
    .bottom-half {
      height: 50%;
      width: 100%;
      background: #000;
    }

    .top-half {
      transform-origin: top;
      animation: slideUp 1.6s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      animation-delay: 0.8s;
    }

    .bottom-half {
      transform-origin: bottom;
      animation: slideDown 1.6s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      animation-delay: 0.8s;
    }

    @keyframes slideUp {
      to { transform: translateY(-100%); }
    }

    @keyframes slideDown {
      to { transform: translateY(100%); }
    }

    /* Text container */
    .text-container {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      pointer-events: none;
      z-index: 10;
    }

    .word {
      position: absolute;
      font-size: clamp(5rem, 16vw, 14rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.9;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(120px);
      transition: all 1s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .word.show {
      opacity: 1;
      transform: translateY(0);
    }

    .word.hide {
      opacity: 0;
      transform: translateY(-80px);
    }

    .word-1 { color: #000; }
    .word-2 { color: #111; }
    .word-3 { color: #000; font-size: clamp(4.5rem, 14vw, 12rem); }

    .dot {
      color: #1972e6;
      display: inline-block;
    }

    .arrow-container {
      position: fixed;
      bottom: 7vh;
      left: 50%; 
      transform: translateX(-50%);
      z-index: 30;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.3s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatArrow 2.4s ease-in-out infinite;
    }

    .arrow-container.visible {
      opacity: 0.7;
      pointer-events: auto;
    }

    .arrow-container:hover {
      opacity: 1 !important;
      transform: translateX(-50%) scale(1.15);
    }

    .arrow-container svg {
      display: block;
      width: 40px;
      height: 40px;
      stroke: #000;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transition: transform 0.2s ease;
    }

    @keyframes floatArrow {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    /* White overlay slide-up */
    #white-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      transform: translateY(100%);
      transition: transform 1.4s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 25;
      pointer-events: none;
    }

    #white-overlay.active {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .word     { font-size: clamp(3.5rem, 14vw, 10rem); }
      .word-3   { font-size: clamp(3rem, 12vw, 8rem); }
      .arrow-container svg { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

<!-- Text Intro -->
<div class="text-container">
  <div class="word word-1" id="w1">SEHAT</div>
  <div class="word word-2" id="w2">KUAT</div>
  <div class="word word-3" id="w3">ASISTENKU<span class="dot">.</span></div>
</div>

<!-- Black screen split -->
<div class="black-screen" id="blackscreen">
  <div class="top-half"></div>
  <div class="bottom-half"></div>
</div>

<!-- Arrow (↑) minimalis, tanpa background/border -->
<div class="arrow-container" id="arrowContainer">
  <svg width="40" height="40" viewBox="0 0 24 24">
    <path d="M12 18V6M12 6l-6 6M12 6l6 6" />
  </svg>
</div>

<!-- White overlay (slide-up) -->
<div id="white-overlay"></div>

<script>
  (function() {
    // --- DOM refs ---
    const w1 = document.getElementById('w1');
    const w2 = document.getElementById('w2');
    const w3 = document.getElementById('w3');
    const blacks = document.getElementById('blackscreen');
    const arrowContainer = document.getElementById('arrowContainer');
    const whiteOverlay = document.getElementById('white-overlay');

    // --- state ---
    let transitionExecuted = false;
    let lastTouchY = 0;
    let touchMoved = false;

    // --- Fungsi transisi: white overlay slide up + pindah halaman ---
    function executeTransition() {
      if (transitionExecuted) return;
      transitionExecuted = true;

      // Hapus semua event listener
      window.removeEventListener('wheel', handleScrollUp);
      window.removeEventListener('touchmove', handleTouchMove);
      window.removeEventListener('touchstart', handleTouchStart);
      
      // Nonaktifkan klik arrow
      arrowContainer.style.pointerEvents = 'none';

      // Aktifkan white overlay (slide up)
      whiteOverlay.classList.add('active');

      // Setelah animasi selesai, buka halaman utama
      setTimeout(function() {
        window.location.href = 'halamanutama.html';
      }, 1500);
    }

    // --- Handler scroll ke atas (wheel) ---
    function handleScrollUp(e) {
      if (e.deltaY < 0) {
        e.preventDefault();
        executeTransition();
      }
    }

    // --- Handler touch start ---
    function handleTouchStart(e) {
      if (e.touches.length === 1) {
        lastTouchY = e.touches[0].clientY;
        touchMoved = false;
      }
    }

    // --- Handler touch move ---
    function handleTouchMove(e) {
      if (e.touches.length !== 1) return;
      
      const touch = e.touches[0];
      const currentY = touch.clientY;
      
      if (lastTouchY === 0) {
        lastTouchY = currentY;
        return;
      }
      
      const diff = lastTouchY - currentY;
      
      if (diff > 20) { // swipe ke atas
        e.preventDefault();
        touchMoved = true;
        executeTransition();
      }
    }

    // --- Klik panah ---
    arrowContainer.addEventListener('click', function(e) {
      e.stopPropagation();
      executeTransition();
    });

    // --- SEQUENCE INTRO ---
    setTimeout(() => {
      w1.classList.add('show');

      setTimeout(() => {
        w1.classList.remove('show');
        w1.classList.add('hide');

        setTimeout(() => {
          w2.classList.add('show');

          setTimeout(() => {
            w2.classList.remove('show');
            w2.classList.add('hide');

            setTimeout(() => {
              w3.classList.add('show');

              setTimeout(() => {
                arrowContainer.classList.add('visible');
                // Aktifkan event setelah arrow visible
                window.addEventListener('wheel', handleScrollUp, { passive: false });
                window.addEventListener('touchstart', handleTouchStart, { passive: true });
                window.addEventListener('touchmove', handleTouchMove, { passive: false });
              }, 800);

              setTimeout(() => {
                if (blacks && blacks.parentNode) blacks.remove();
              }, 2800);

            }, 900);

          }, 1400);

        }, 1000);

      }, 1100);

    }, 2600);

    // Safety: hapus black screen jika masih ada
    setTimeout(() => {
      if (blacks && blacks.parentNode) blacks.remove();
    }, 8000);

  })();
</script>
</body>
</html>
